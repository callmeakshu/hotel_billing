<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Hotel Billing System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Register Hotel Owner</h1>
            <p>Create your hotel billing account in seconds.</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-container">
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST" class="auth-form">
            <label>Hotel Name</label>
            <input type="text" name="hotel_name" placeholder="Hotel Sunshine" required />
            <label>Email</label>
            <input type="email" name="email" placeholder="hotel@example.com" required />
            <label>Password</label>
            <input type="password" name="password" placeholder="Create a password" required />
            <label>Contact</label>
            <input type="text" name="contact" placeholder="9876543210" pattern="\d{10}" maxlength="10" title="Enter 10 digit mobile number" required />
            <button type="submit" class="btn btn-primary">Register</button>
            <p class="auth-note">Already registered? <a href="{{ url_for('login') }}">Login now</a></p>
        </form>
    </div>
</body>
</html>
